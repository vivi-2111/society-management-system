version: '3.8'

services:
  oracledb:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_db
    environment:
      - ORACLE_PASSWORD=MYPASSWORD # Same as DB_PASSWORD in .env
      - APP_USER=MYUSER           # Same as DB_USER in .env
      - APP_PASSWORD=MYPASSWORD   # Same as DB_PASSWORD in .env
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data:
